{% extends "formsdemo/formsdemo_base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h1>{{ page_title }}</h1>
{% if invalid %}
<div class="btn-warning">
    Some fields need to be corrected
</div>
{% endif %}
<form action="{% url 'formsdemo:demo' %}" method="post">
    {% csrf_token %}
    {% crispy form %}
    <input type="submit" value="Submit"/>
</form>

{% endblock %}
